<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>CreatorTasks — AI Content Marketplace</title>
    <meta name="description" content="Post AI content tasks and earn money. Get paid for creating reels, hooks, and thumbnails with instant Razorpay payouts." />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://accounts.google.com" crossorigin>
    <link rel="dns-prefetch" href="https://accounts.google.com">
    <link rel="preconnect" href="https://clerk-telemetry.com" crossorigin>
    <link rel="dns-prefetch" href="https://clerk-telemetry.com">
    <script>
      (function () {
        try {
          var pk = "%VITE_CLERK_PUBLISHABLE_KEY%";
          if (!pk || pk.indexOf("VITE_CLERK_PUBLISHABLE_KEY") !== -1) return;
          var parts = pk.split("_");
          if (parts.length < 3) return;
          var encoded = parts.slice(2).join("_");
          var domain = atob(encoded).replace(/\$+$/, "").trim();
          if (!domain || /[^a-z0-9.\-]/i.test(domain)) return;
          var origin = "https://" + domain;
          var pre = document.createElement("link");
          pre.rel = "preconnect";
          pre.href = origin;
          pre.crossOrigin = "anonymous";
          document.head.appendChild(pre);
          var dns = document.createElement("link");
          dns.rel = "dns-prefetch";
          dns.href = origin;
          document.head.appendChild(dns);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
