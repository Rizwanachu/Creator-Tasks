kind = "mobile"
previewPath = "/mobile/"
title = "CreatorTasks Mobile"
version = "1.0.0"
id = "artifacts/creatortasks-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 20296

[services.development]
run = "pnpm --filter @workspace/creatortasks-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/creatortasks-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/creatortasks-mobile", "run", "serve" ]

[services.env]
PORT = "20296"
BASE_PATH = "/mobile/"
